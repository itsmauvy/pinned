<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — pinned</title>
  <meta name="description" content="pinned 로그인 — 시즌마다 새로 소개하는 패션 아카이브." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="masthead">
    <a class="wordmark" href="index.html" aria-label="pinned — home">
      <img src="assets/img/pinned%20logo%201.svg" alt="pinned" />
    </a>
  </header>

  <main class="login-page-main">
    <article class="login-card" id="loginCard"></article>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";
      const ACCOUNT_STORE = "pinned.account.v1";
      const $ = (s) => document.querySelector(s);
      const $$ = (s) => [...document.querySelectorAll(s)];
      const getAccount = () => { try { return JSON.parse(localStorage.getItem(ACCOUNT_STORE)); } catch { return null; } };
      const saveAccount = (a) => localStorage.setItem(ACCOUNT_STORE, JSON.stringify(a));
      const clearAccount = () => localStorage.removeItem(ACCOUNT_STORE);

      let toastTimer;
      function toast(msg) {
        const t = $("#toast");
        t.textContent = msg; t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
      }

      const EYE_OPEN = `<svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
      const EYE_OFF = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.8 21.8 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a21.8 21.8 0 0 1-2.94 3.94M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

      const card = $("#loginCard");

      function render() {
        const account = getAccount();
        if (account) {
          card.innerHTML = `
            <div class="login-signed-in">
              <h1 class="page-head">다시 오셨네요.</h1>
              <p class="body"><strong>${account.email}</strong>(으)로 로그인되어 있어요.</p>
              <button class="cta solid" style="width:100%" id="signOutBtn">로그아웃</button>
              <a class="board-continue" href="index.html">사이트로 돌아가기 →</a>
            </div>`;
          $("#signOutBtn").addEventListener("click", () => { clearAccount(); render(); });
        } else {
          card.innerHTML = `
            <h1 class="page-head">로그인</h1>
            <form id="loginForm" class="login-form">
              <label>이메일<input type="email" id="loginEmail" required autocomplete="email" /></label>
              <label>비밀번호
                <div class="password-field">
                  <input type="password" id="loginPassword" required autocomplete="current-password" />
                  <button type="button" class="password-toggle" id="pwToggle" aria-label="비밀번호 표시">${EYE_OPEN}</button>
                </div>
              </label>
              <button type="submit" class="cta solid" style="width:100%">로그인</button>
            </form>
            <div class="login-links">
              <button type="button" id="signupLink">회원가입</button>
              <span class="login-links-sep">|</span>
              <button type="button" id="forgotLink">비밀번호를 잊으셨나요</button>
            </div>
            <div class="login-divider"><span>또는</span></div>
            <div class="social-login">
              <button type="button" class="social-btn social-google" data-social="google">
                <svg viewBox="0 0 18 18" aria-hidden="true">
                  <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                  <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                  <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
                  <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                </svg>
                Google로 로그인
              </button>
              <button type="button" class="social-btn social-kakao" data-social="kakao">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="#191919" d="M12 3C6.477 3 2 6.463 2 10.75c0 2.734 1.815 5.14 4.547 6.51-.2.75-.727 2.717-.833 3.14-.13.523.19.516.4.375.166-.11 2.64-1.795 3.71-2.53.71.104 1.44.157 2.176.157 5.523 0 10-3.463 10-7.652C22 6.463 17.523 3 12 3z"/>
                </svg>
                카카오로 로그인
              </button>
              <button type="button" class="social-btn social-naver" data-social="naver">
                <span class="social-icon">N</span>
                네이버로 로그인
              </button>
            </div>
            <a class="board-continue" href="index.html">사이트로 돌아가기 →</a>`;
          $("#loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const email = $("#loginEmail").value.trim();
            if (!email) return;
            saveAccount({ email });
            window.location.href = "index.html";
          });
          $$(".social-btn").forEach((btn) => btn.addEventListener("click", () => {
            saveAccount({ email: `you@${btn.dataset.social}.com`, provider: btn.dataset.social });
            window.location.href = "index.html";
          }));
          $("#pwToggle").addEventListener("click", () => {
            const input = $("#loginPassword");
            const showing = input.type === "text";
            input.type = showing ? "password" : "text";
            $("#pwToggle").innerHTML = showing ? EYE_OPEN : EYE_OFF;
          });
          $("#signupLink").addEventListener("click", () => toast("이메일만 입력하면 자동으로 계정이 만들어져요"));
          $("#forgotLink").addEventListener("click", () => toast("데모라 비밀번호는 아무거나 입력해도 로그인돼요"));
        }
      }
      render();
    })();
  </script>
</body>
</html>
